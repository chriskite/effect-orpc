name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Opt the JS-based actions into the Node 24 runtime ahead of GitHub's
# 2026-06-02 default switchover. Drop this once actions/checkout and
# actions/setup-node ship Node 24-native major versions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'chriskite/effect-orpc' }}
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing requires npm >= 11.5.1; ensure we have it even if
      # the Node 24 bundled npm lags behind.
      - name: Ensure npm supports Trusted Publishing
        run: npm install --global npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Run tests
        run: bun run test

      - name: Create release pull request or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
